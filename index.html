<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteSize - AI Content Creation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 48px;
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.3);
        }
        h1 {
            font-size: 48px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-size: 20px;
            color: #a0a0a0;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .link {
            padding: 16px 32px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .link:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 60px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>ByteSize</h1>
        <p class="tagline">AI-powered content creation for the next generation of creators</p>
        
        <div class="links">
            <a href="terms.html" class="link">Terms of Service</a>
            <a href="privacy.html" class="link">Privacy Policy</a>
        </div>
        
        <div class="footer">
            <p>© 2026 ByteSize. All rights reserved.</p>
            <p>Contact: hello@bytesize.app</p>
        </div>
    </div>
</body>
</html>
